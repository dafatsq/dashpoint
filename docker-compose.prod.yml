version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: dashpoint-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashpoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashpoint_prod_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dashpoint_prod}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dashpoint -d dashpoint_prod" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashpoint-backend-prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dashpoint}:${POSTGRES_PASSWORD:-dashpoint_prod_secret}@db:5432/${POSTGRES_DB:-dashpoint_prod}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-production_secret_key_change_me_to_something_secure}
      PORT: "8080"
      ENVIRONMENT: production
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
